  mobile_scanner: ^7.2.0
  flutter_secure_storage: ^10.2.0
  app_links: ^7.0.0
  app_settings: ^8.0.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
