name: traccar_client
description: "Traccar Client"
publish_to: 'none'
version: 10.0.0+138

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  traccar_client_sdk: ^0.0.23
  shared_preferences: ^2.5.5
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  quick_actions: ^1.1.0
  shared_preferences_android: ^2.4.23
  flutter_secure_storage: ^10.2.0
  app_links: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  ios: true
  android: "ic_launcher"
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
